<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineSwipe — Genres</title>
  <link rel="stylesheet" href="css/landing.css" />
  <link rel="stylesheet" href="css/genre.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="header__logo">CineSwipe</a>
      <button class="header__hamburger" id="hamburgerBtn" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <nav class="header__nav" id="mainNav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="explore.html" class="nav-link">Explore</a>
        <a href="genre.html" class="nav-link active">Genres</a>
        <a href="mylist.html" class="nav-link">My List</a>
      </nav>
    </div>
  </header>

  <main class="genre-main">

    <!-- SEARCH SECTION -->
    <section class="genre-search">
      <h1 class="genre-search__title">Find Your Next Movie</h1>
      <p class="genre-search__sub">Search by title or genre, or browse categories below.</p>

      <form class="search-bar" id="searchForm" role="search">
        <input
          class="search-bar__input"
          id="searchInput"
          type="search"
          placeholder="Search by movie name or genre…"
          autocomplete="off"
          aria-label="Search movies"
        />
        <button class="search-bar__btn" type="submit" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </form>

      <!-- Genre quick-filter chips -->
      <div class="genre-chips" id="genreChips" aria-label="Quick genre filters">
        <button class="genre-chip" data-genre="action">Action</button>
        <button class="genre-chip" data-genre="comedy">Comedy</button>
        <button class="genre-chip" data-genre="drama">Drama</button>
        <button class="genre-chip" data-genre="horror">Horror</button>
        <button class="genre-chip" data-genre="sci-fi">Sci-Fi</button>
        <button class="genre-chip" data-genre="romance">Romance</button>
        <button class="genre-chip" data-genre="animation">Animation</button>
        <button class="genre-chip" data-genre="thriller">Thriller</button>
        <button class="genre-chip" data-genre="fantasy">Fantasy</button>
        <button class="genre-chip" data-genre="crime">Crime</button>
      </div>
    </section>

    <!-- SEARCH RESULTS (shown only when searching) -->
    <section class="carousel-section search-results" id="searchResults" hidden>
      <div class="carousel-section__header">
        <h2 class="carousel-section__title">
          Results for "<span id="searchQueryLabel"></span>"
        </h2>
        <button class="btn btn--see-more" id="clearSearch">✕ Clear</button>
      </div>
      <div class="carousel" id="carouselResults">
        <button class="carousel__arrow carousel__arrow--left" aria-label="Scroll left">&#8249;</button>
        <div class="carousel__track" id="trackResults"></div>
        <button class="carousel__arrow carousel__arrow--right" aria-label="Scroll right">&#8250;</button>
      </div>
    </section>

    <!-- BROWSE CAROUSELS -->
    <div class="genre-carousels" id="genreCarousels">

      <!-- YOU MIGHT LIKE -->
      <section class="carousel-section">
        <div class="carousel-section__header">
          <h2 class="carousel-section__title">You Might Like…</h2>
          <a href="#" class="btn btn--see-more">See More</a>
        </div>
        <div class="carousel" id="carouselMightLike">
          <button class="carousel__arrow carousel__arrow--left" aria-label="Scroll left">&#8249;</button>
          <div class="carousel__track" id="trackMightLike"></div>
          <button class="carousel__arrow carousel__arrow--right" aria-label="Scroll right">&#8250;</button>
        </div>
      </section>

      <!-- NEW RELEASES -->
      <section class="carousel-section">
        <div class="carousel-section__header">
          <h2 class="carousel-section__title">New Releases</h2>
          <a href="#" class="btn btn--see-more">See More</a>
        </div>
        <div class="carousel" id="carouselNew">
          <button class="carousel__arrow carousel__arrow--left" aria-label="Scroll left">&#8249;</button>
          <div class="carousel__track" id="trackNew"></div>
          <button class="carousel__arrow carousel__arrow--right" aria-label="Scroll right">&#8250;</button>
        </div>
      </section>

      <!-- ANIMATION -->
      <section class="carousel-section">
        <div class="carousel-section__header">
          <h2 class="carousel-section__title">Animation</h2>
          <a href="#" class="btn btn--see-more">See More</a>
        </div>
        <div class="carousel" id="carouselAnimation">
          <button class="carousel__arrow carousel__arrow--left" aria-label="Scroll left">&#8249;</button>
          <div class="carousel__track" id="trackAnimation"></div>
          <button class="carousel__arrow carousel__arrow--right" aria-label="Scroll right">&#8250;</button>
        </div>
      </section>

      <!-- ROMANCE -->
      <section class="carousel-section">
        <div class="carousel-section__header">
          <h2 class="carousel-section__title">Romance</h2>
          <a href="#" class="btn btn--see-more">See More</a>
        </div>
        <div class="carousel" id="carouselRomance">
          <button class="carousel__arrow carousel__arrow--left" aria-label="Scroll left">&#8249;</button>
          <div class="carousel__track" id="trackRomance"></div>
          <button class="carousel__arrow carousel__arrow--right" aria-label="Scroll right">&#8250;</button>
        </div>
      </section>

    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/genre.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
